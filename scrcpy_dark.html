  .connected .status-pill { background:#14532d; }

  .connected .pill-text { color:#4ade80; }
  .center-icon { width:72px; height:72px; border-radius:24px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }

  .hero-title { font-size:28px; font-weight:300; text-align:center; margin:0 0 6px; letter-spacing:-0.3px; }

  .connected .hero-title { color:#4ade80; }
  .hero-sub { font-size:12px; text-align:center; margin:0 0 24px; }
  .disconnected .hero-sub { color:#4b5563; }
  .connected .hero-sub { color:#16a34a; }
  .info-row { display:flex; gap:8px; margin-bottom:16px; }
  .info-chip { flex:1; border-radius:12px; padding:8px 10px; text-align:center; }
  .disconnected .info-chip { background:#111827; }
  .connected .info-chip { background:#052e16; border:1px solid #14532d; }
  .info-val { font-size:14px; font-weight:500; color:#e5e7eb; margin:0 0 2px; display:block; }
  .connected .info-val { color:#86efac; }
  .info-lbl { font-size:10px; color:#6b7280; display:block; }
  .dis-btn { width:100%; border:none; border-radius:16px; padding:14px; font-size:14px; font-weight:500; cursor:pointer; }
  .dis-btn.inactive { background:#111827; color:#4b5563; }
  .dis-btn.active { background:#1a0808; border:1.5px solid #991b1b; color:#fca5a5; }
  .opt-card { margin:0 14px 12px; background:#1f2937; border-radius:22px; border:1px solid #374151; overflow:hidden; }
  .opt-head { padding:14px 16px 6px; font-size:11px; font-weight:500; color:#6b7280; letter-spacing:0.5px; text-transform:uppercase; }
  .opt-row { display:flex; align-items:center; justify-content:space-between; padding:11px 16px; border-top:1px solid #111827; }
  .opt-left { display:flex; align-items:center; gap:10px; }
  .opt-ico { width:30px; height:30px; border-radius:9px; background:#111827; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .opt-name { font-size:12px; color:#e5e7eb; margin:0 0 1px; }
  .opt-sub { font-size:10px; color:#4b5563; margin:0; }
  .tog { width:40px; height:22px; border-radius:11px; background:#2563eb; position:relative; flex-shrink:0; }
  .tog::after { content:''; width:16px; height:16px; background:#fff; border-radius:50%; position:absolute; right:3px; top:3px; }
  .foot { display:flex; align-items:center; justify-content:center; gap:5px; padding:10px 0 0; }
  .fdot { width:5px; height:5px; border-radius:50%; background:#22c55e; }
  .ftxt { font-size:10px; color:#4b5563; }
</style>

<script>
  let secs = 452;
  const el = document.getElementById('duration-display');
  function fmt(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sc = s % 60;
    const pad = n => String(n).padStart(2, '0');
    return h > 0 ? `${pad(h)}:${pad(m)}:${pad(sc)}` : `${pad(m)}:${pad(sc)}`;
  }
  if (el) {
    el.textContent = fmt(secs);
    setInterval(() => { secs++; el.textContent = fmt(secs); }, 1000);
  }
</script>
