
<style>
  .phone {
    width: 300px;
    background: #f9fafb;
    border-radius: 44px;
    overflow: hidden;
    border: 6px solid #e5e7eb;
    font-family: 'Google Sans', 'Roboto', sans-serif;
  }
  .inner { padding-bottom: 32px; }
  .sbar { display:flex; justify-content:space-between; align-items:center; padding:14px 24px 4px; }
  .stime { font-size:13px; font-weight:500; color:#374151; }
  .sicons { display:flex; gap:6px; align-items:center; }
  .topbar { display:flex; justify-content:space-between; align-items:center; padding:6px 18px 18px; }
  .appname { font-size:20px; font-weight:400; color:#111827; }
  .iconbtn { width:38px; height:38px; border-radius:50%; background:#f3f4f6; display:flex; align-items:center; justify-content:center; }

  .hero { margin:0 14px 12px; border-radius:28px; padding:24px 20px 20px; border:1px solid; }
  .hero.disconnected { background:#fff; border-color:#e5e7eb; }
  .hero.connected { background:#f0fdf4; border-color:#bbf7d0; }

  .status-pill { display:inline-flex; align-items:center; gap:5px; border-radius:20px; padding:4px 10px; margin-bottom:24px; }
  .disconnected .status-pill { background:#f3f4f6; }
  .connected .status-pill { background:#dcfce7; }
  .pill-dot { width:6px; height:6px; border-radius:50%; }
  .pill-text { font-size:11px; font-weight:500; }
  .disconnected .pill-text { color:#6b7280; }
  .connected .pill-text { color:#15803d; }

  .center-icon { width:72px; height:72px; border-radius:24px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
  .disconnected .center-icon { background:#f9fafb; border:1px solid #e5e7eb; }
  .connected .center-icon { background:#dcfce7; border:1.5px solid #86efac; }

  .hero-title { font-size:28px; font-weight:300; text-align:center; margin:0 0 6px; letter-spacing:-0.3px; }
  .disconnected .hero-title { color:#9ca3af; }
  .connected .hero-title { color:#15803d; }

  .hero-sub { font-size:12px; text-align:center; margin:0 0 24px; }
  .disconnected .hero-sub { color:#9ca3af; }
  .connected .hero-sub { color:#16a34a; }

  .info-row { display:flex; gap:8px; margin-bottom:16px; }
  .info-chip { flex:1; border-radius:12px; padding:8px 10px; text-align:center; }
  .disconnected .info-chip { background:#f9fafb; border:1px solid #e5e7eb; }
  .connected .info-chip { background:#fff; border:1px solid #bbf7d0; }
  .info-val { font-size:14px; font-weight:500; margin:0 0 2px; display:block; }
  .disconnected .info-val { color:#9ca3af; }
  .connected .info-val { color:#15803d; }
  .info-lbl { font-size:10px; color:#9ca3af; display:block; }

  .dis-btn { width:100%; border:none; border-radius:16px; padding:14px; font-size:14px; font-weight:500; cursor:pointer; }
  .dis-btn.inactive { background:#f3f4f6; color:#9ca3af; }
  .dis-btn.active { background:#fff1f2; border:1.5px solid #fca5a5; color:#dc2626; }

  .opt-card { margin:0 14px 12px; background:#fff; border-radius:22px; border:1px solid #e5e7eb; overflow:hidden; }
  .opt-head { padding:14px 16px 6px; font-size:11px; font-weight:500; color:#9ca3af; letter-spacing:0.5px; text-transform:uppercase; }
  .opt-row { display:flex; align-items:center; justify-content:space-between; padding:11px 16px; border-top:1px solid #f3f4f6; }
  .opt-left { display:flex; align-items:center; gap:10px; }
  .opt-ico { width:30px; height:30px; border-radius:9px; background:#f3f4f6; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .opt-name { font-size:12px; color:#1f2937; margin:0 0 1px; }
  .opt-sub { font-size:10px; color:#9ca3af; margin:0; }
  .tog { width:40px; height:22px; border-radius:11px; background:#16a34a; position:relative; flex-shrink:0; }
  .tog::after { content:''; width:16px; height:16px; background:#fff; border-radius:50%; position:absolute; right:3px; top:3px; }

  .foot { display:flex; align-items:center; justify-content:center; gap:5px; padding:10px 0 0; }
  .fdot { width:5px; height:5px; border-radius:50%; background:#16a34a; }
  .ftxt { font-size:10px; color:#9ca3af; }
</style>

<script>
  let s = 452;
  const el = document.getElementById('dur');
  const fmt = n => { const h=Math.floor(n/3600),m=Math.floor((n%3600)/60),sc=n%60,p=x=>String(x).padStart(2,'0'); return h>0?`${p(h)}:${p(m)}:${p(sc)}`:`${p(m)}:${p(sc)}`; };
  if(el){ el.textContent=fmt(s); setInterval(()=>{ s++; el.textContent=fmt(s); },1000); }
</script>
